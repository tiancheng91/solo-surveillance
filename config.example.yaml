# 复制为 config.yaml 后按需修改（config.yaml 建议加入 .gitignore）
# 详细配置说明与最佳实践见 docs/configuration.md

# ─── LLM 连接配置（全局，所有 LLM 功能共用）───
# connection 放在这里，detectors 里只声明"检测什么"
# llm:
#   provider: "anthropic"                # "anthropic" 或 "openai"
#   model: "claude-sonnet-4-20250514"
#   api_key: "${ANTHROPIC_API_KEY}"       # 建议用环境变量
#   base_url: ""                           # 自定义接入点（可选）
#   cooldown_sec: 60                       # API 调用冷却（秒）
#   resize_width: 640                      # 缩放长边（像素），0=不缩放

defaults:
  # ─── 运动检测 ───
  motion:
    resize_width: 320        # 帧缩放到此宽度再比对，值越小越快
    blur_ksize: 7            # 高斯模糊核大小（奇数），越大对噪点越不敏感
    diff_threshold: 28       # 像素差值阈值（0-255），越大越不容易触发
    min_change_ratio: 0.012  # 变化像素占比（1.2%）超过此值判定为运动
    check_interval_sec: 0.2  # 采样间隔（秒）；0=每帧，>0 跳过中间帧降低 CPU

  # ─── AI 推理（运动触发后采集多帧批量推理）───
  ai:
    frames: 3                # 采集帧数（1=单帧，>1=YOLO/LLM 均受益）
    interval_sec: 0.5        # 帧间隔（秒）
    cooldown_sec: 10.0       # 冷却时间，防止频繁检测

  # ─── 录制配置 ───
  recordings:
    base_dir: "data"          # 录制文件根目录
    motion:                   # 运动触发（AI 检测前）
      snapshot: false
      clip: false
      clip_seconds: 5
    person:                   # YOLO 检测到人
      snapshot: true
      clip: false
      clip_seconds: 10
    # llm_feeding:            # LLM 场景加 llm_ 前缀
    #   snapshot: true
    #   clip: true
    #   clip_seconds: 15

  # ─── 检测器 ───
  detectors:
    person:                   # YOLOv8 人体检测
      enabled: true
      model: "yolov8n.pt"    # n/s/m/l/x 依次更准更慢
      conf: 0.35              # 置信度阈值
      classes: [0]            # COCO 类别 ID，[0]=人
    # ── LLM 视觉场景识别（可选）──
    # llm_vision:
    #   enabled: true
    #   conf: 0.6
    #   scenes:
    #     feeding: "婴儿正在吃奶（奶瓶或母乳喂养）"
    #     crying: "婴儿哭闹、表情痛苦"
    #     changing: "正在换尿布"

  # 可选：检测区域（归一化坐标 x1,y1,x2,y2，不写=全帧）
  # region: [0, 0, 1, 1]

cameras:
  - id: xiaomi1
    enabled: true
    stream_url: "rtsp://127.0.0.1:8554/xiaomi1"
    # region: [0.1, 0.2, 0.9, 0.95]
    # motion:
    #   min_change_ratio: 0.02
    detectors:
      person:
        enabled: true
        model: "yolov8n.pt"
        conf: 0.4
    # recordings:
    #   person:
    #     clip_seconds: 15

