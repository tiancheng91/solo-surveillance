# 复制为 config.yaml 后按需修改（config.yaml 建议加入 .gitignore）

# 可选：多路相机共用的默认值，单路里未写的项会回退到这里
# ─── LLM 连接配置（全局，所有 LLM 功能共用）───
# 连接信息放在这里，detectors 和 recordings 里只声明"检测什么"和"录什么"
# llm:
#   provider: "anthropic"                # "anthropic" 或 "openai"
#   model: "claude-sonnet-4-20250514"
#   api_key: "${ANTHROPIC_API_KEY}"       # 建议用环境变量
#   base_url: ""                           # 自定义接入点（可选）
#   cooldown_sec: 60                       # API 调用冷却（秒）
#   resize_width: 640                      # 缩放长边（像素），降低 API 费用；0=不缩放

defaults:
  motion:
    resize_width: 320
    blur_ksize: 7
    diff_threshold: 28
    min_change_ratio: 0.012
    ai_cooldown_sec: 10.0
    # check_interval_sec: 0.2     # 运动检测采样间隔(秒)；0=每帧检测，>0 通过 grab() 跳过中间帧降低 CPU
  # motion 触发后短窗口内多帧推理，标签取各帧最大置信度（设 enabled: true 启用）
  vision_burst:
    enabled: false
    window_sec: 1.2
    interval_sec: 0.6
  # 场景化录制：按事件类型独立配置截图/视频片段；文件存 data/{cameraId}/{date}/ 下
  # LLM 场景的事件类型为 llm_{scene_key}，例如 llm_feeding、llm_crying
  recordings:
    base_dir: "data"
    motion:                    # 运动触发（AI 检测前）
      snapshot: false
      clip: false
      clip_seconds: 5
    person:                    # AI 检测到人
      snapshot: true
      clip: false
      clip_seconds: 10
  detectors:
    person:
      enabled: true
      model: "yolov8n.pt"
      conf: 0.35
      classes: [0]
    # ── LLM 视觉场景识别（可选）──
    # 这里只定义"检测什么场景"，连接配置从全局 llm 段读取
    # llm_vision:
    #   enabled: true
    #   conf: 0.6                            # 场景置信度阈值
    #   frames: 1                            # 传入帧数（>1 可提升准确率）
    #   scenes:
    #     feeding: "婴儿正在吃奶（奶瓶或母乳喂养）"
    #     crying: "婴儿哭闹、表情痛苦"
    #     changing: "正在换尿布"
  # 可选：检测区域（归一化坐标 x1,y1,x2,y2，不写=全帧）
  # 画面裁剪后做 motion 和 AI 检测，截图/视频仍保存原始全尺寸
  # region: [0, 0, 1, 1]

cameras:
  - id: xiaomi1
    enabled: true
    # RTSP 直连
    stream_url: "rtsp://127.0.0.1:8554/xiaomi1"
    # 可选：检测区域（不写则全帧）
    # region: [0.1, 0.2, 0.9, 0.95]
    # 本路可选覆盖 defaults
    # motion:
    #   min_change_ratio: 0.02
    detectors:
      person:
        enabled: true
        model: "yolov8n.pt"
        conf: 0.4
    # recordings:
    #   person:
    #     clip_seconds: 15

  # - id: front_door
  #   enabled: false
  #   # ONVIF 自动发现（支持 ${ENV_VAR}）
  #   stream_url: "onvif://admin:${CAM_PASSWORD}@192.168.1.100:80?profile=0"
  #   detectors:
  #     person:
  #       enabled: true

  # - id: cam2
  #   enabled: false
  #   stream_url: "rtsp://..."

# ─── Home Assistant 集成（可选）───
# 启用后将事件推送到 HA 事件总线（使用 Python urllib，零额外依赖）
# hass:
#   enabled: true
#   url: "http://homeassistant:8123"
